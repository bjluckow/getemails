accounts:
  - name: work-gmail
    provider: gmail
    credentials_file: config/credentials.json   # OAuth2 client secret from GCP
    token_file: config/token_work-gmail.json     # auto-generated after first auth

  - name: personal-icloud
    provider: icloud
    username: you@icloud.com
    # generate at appleid.apple.com → Sign-In and Security → App-Specific Passwords
    password: ${ICLOUD_APP_PASSWORD}

  - name: old-aol
    provider: aol
    username: you@aol.com
    # generate at login.aol.com → Account Security → Generate app password
    password: ${AOL_APP_PASSWORD}
    # optional: restrict to specific folders (defaults to all folders)
    # folders:
    #   - INBOX
    #   - Sent